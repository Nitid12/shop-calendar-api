spring:
  datasource: 
    url: "***"
    driver-class-name: org.mariadb.jdbc.Driver
    username: root
    password: "***"
    hikari:
      maximum-pool-size: 10
      connection-timeout: 5000
      connection-init-sql: SELECT 1
      validation-timeout: 2000
      minimum-idle: 10
      idle-timeout: 600000
      poolName: HikariCP
      readOnly: false

  cache:
    type: none
    redis:
      time-to-live: 3600000
  redis:
    cluster:
      nodes: localhost:7001,localhost:7001,localhost:7001,localhost:7002,192.33.0.85:7002,localhost:7002
      max-redirects: 5
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        query:
          in_clause_parameter_padding: true
        show_sql: true
        format_sql: true
    generate-ddl: false
    defer-datasource-initialization: true
