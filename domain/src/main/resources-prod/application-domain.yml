spring:
  datasource: 
    url: "***"
    driver-class-name: org.mariadb.jdbc.Driver
    username: mco
    password: "***"
    hikari:
      maximum-pool-size: 10
      connection-timeout: 5000
      connection-init-sql: SELECT 1
      validation-timeout: 2000
      minimum-idle: 10
      idle-timeout: 600000
      poolName: HikariCP
      readOnly: false
  cache:
    type: redis
    redis:
      time-to-live: 3600000
  redis:
    cluster:
      nodes: localhost:7001,localhost:7001,localhost:7001,localhost:7002,localhost:7002,localhost:7002
      max-redirects: 5
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show_sql: true
        format_sql: true
    generate-ddl: false
    defer-datasource-initialization: true