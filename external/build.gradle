plugins {
    id 'io.spring.dependency-management' version '1.0.11.RELEASE'
    id 'java'
}

group 'com.sample'
version 'unspecified'

repositories {
    mavenCentral()
}

dependencies {

    api 'org.springframework.cloud:spring-cloud-starter-openfeign'
    api 'com.fasterxml.jackson.core:jackson-annotations:2.13.1'
    api 'com.fasterxml.jackson.core:jackson-databind:2.13.1'
    api 'com.fasterxml.jackson.core:jackson-core:2.13.1'
    api "net.sf.json-lib:json-lib:2.4:jdk15"
    api 'commons-beanutils:commons-beanutils:1.9.4'

    implementation group: 'org.telegram', name: 'telegrambots', version: '5.5.0'

    implementation 'io.jsonwebtoken:jjwt-api:0.11.2'
    implementation 'io.jsonwebtoken:jjwt-impl:0.11.2'
    implementation 'io.jsonwebtoken:jjwt-jackson:0.11.2'

    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.8.1'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.8.1'
}

dependencyManagement {
    imports {
        mavenBom 'org.springframework.cloud:spring-cloud-dependencies:2021.0.1'
    }
}

jar { enabled = true }

test {
    useJUnitPlatform()
    exclude '**/*'
}

tasks {
    processResources {
        duplicatesStrategy = org.gradle.api.file.DuplicatesStrategy.INCLUDE
    }
}